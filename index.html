<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Личный кабинет</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 600px; margin: 40px auto; padding: 20px; background: #f5f7fa; }
    input, button { padding: 12px; width: 100%; margin: 5px 0; box-sizing: border-box; }
    button { background: #2563eb; color: white; border: none; border-radius: 6px; cursor: pointer; }
    button:hover { background: #1d4ed8; }
    #cabinet { display: none; margin-top: 20px; }
    .profile { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; background: white; padding: 15px; border-radius: 10px; box-shadow: 0 2px 6px rgba(0,0,0,0.05); }
    .profile img { width: 70px; height: 70px; border-radius: 50%; object-fit: cover; }
    .course-card { background: white; padding: 15px; margin-bottom: 15px; border-radius: 8px; border-left: 4px solid #2563eb; }
    .course-card h3 { margin: 0 0 10px 0; color: #1e293b; }
    .course-card p { margin: 4px 0; color: #475569; }
    #error { color: #dc2626; margin-top: 10px; }
  </style>
</head>
<body>

  <h2>Вход в кабинет</h2>
  <input id="loginInput" type="text" placeholder="Ваш логин">
  <button onclick="loadCabinet()">Войти</button>
  <p id="error"></p>

  <div id="cabinet">
    <div class="profile">
      <img id="photo" src="" alt="Фото">
      <div><h3 id="name" style="margin:0;"></h3><small id="loginDisplay"></small></div>
    </div>
    <h3 style="margin-top:20px;">📚 Мои курсы</h3>
    <div id="coursesList"></div>
  </div>

  <script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzPGoaEDfp2sWlBBa_2Ca1-HCVfYulqHs-CruClajso_9xXma71atW-BJ6KogVYpO-l/exec';

    async function loadCabinet() {
      const login = document.getElementById('loginInput').value.trim();
      if (!login) return;

      document.getElementById('error').textContent = '';
      document.getElementById('cabinet').style.display = 'none';
      document.getElementById('coursesList').innerHTML = 'Загрузка...';

      try {
        const res = await fetch(SCRIPT_URL, {
          method: 'POST',
          body: JSON.stringify({ login })
        });
        const data = await res.json();
        if (data.error) throw new Error(data.error);

        document.getElementById('name').textContent = data.name;
        document.getElementById('photo').src = data.photo || 'https://via.placeholder.com/80';
        document.getElementById('loginDisplay').textContent = `@${login}`;

        const list = document.getElementById('coursesList');
        list.innerHTML = '';
        
        for (const [course, info] of Object.entries(data.courses)) {
          let html = `<div class="course-card"><h3>${course.toUpperCase()}</h3>`;
          for (const [key, val] of Object.entries(info)) {
            if (key !== 'login') html += `<p><b>${key}:</b> ${val}</p>`;
          }
          html += `</div>`;
          list.innerHTML += html;
        }

        document.getElementById('cabinet').style.display = 'block';
      } catch (e) {
        document.getElementById('error').textContent = e.message;
        document.getElementById('coursesList').innerHTML = '';
      }
    }
  </script>
</body>
</html>
